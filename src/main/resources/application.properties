# ============================================================
# Server
# ============================================================
server.port=${PORT:8080}
server.address=0.0.0.0

# ============================================================
# MySQL Database (Railway)
# ============================================================

spring.datasource.url=jdbc:mysql://${MYSQLHOST:localhost}:${MYSQLPORT:3306}/${MYSQLDATABASE:railway}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=${MYSQLUSER:root}
spring.datasource.password=${MYSQLPASSWORD:password}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ============================================================
# JPA
# ============================================================

spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=${JPA_SHOW_SQL:false}

# ============================================================
# JWT
# ============================================================

jwt.secret=${JWT_SECRET}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# ============================================================
# Google OAuth2 (TEMP DISABLED FOR DEPLOYMENT)
# ============================================================

spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:}
spring.security.oauth2.client.registration.google.scope=email,profile
spring.security.oauth2.client.registration.google.redirect-uri=${OAUTH2_REDIRECT_URI:http://localhost:8080/login/oauth2/code/google}

# ============================================================
# OAuth2 Frontend Callback
# ============================================================

app.oauth2.frontend-redirect-url=${FRONTEND_REDIRECT_URL:http://localhost:4200/oauth2/callback}

