# ============================================================
# Server
# ============================================================
server.port=${PORT:8080}

# ============================================================
# H2 In-Memory Database
# ============================================================
spring.datasource.url=${DB_URL:jdbc:h2:mem:quantitydb}
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:}

spring.h2.console.enabled=${H2_CONSOLE_ENABLED:false}
spring.h2.console.path=/h2-console

# ============================================================
# JPA
# ============================================================
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=${JPA_SHOW_SQL:false}

# ============================================================
# JWT
# ============================================================
jwt.secret=${JWT_SECRET:change-me-to-a-secure-random-256-bit-secret-key!!}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# ============================================================
# Google OAuth2
# ============================================================
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:}
spring.security.oauth2.client.registration.google.scope=email,profile
spring.security.oauth2.client.registration.google.redirect-uri=${OAUTH2_REDIRECT_URI:http://localhost:8080/login/oauth2/code/google}

# ============================================================
# OAuth2 Frontend Callback
# ============================================================
app.oauth2.frontend-redirect-url=${FRONTEND_REDIRECT_URL:http://localhost:4200/oauth2/callback}

# ============================================================
# Actuator (restrict in production)
# ============================================================
management.endpoints.web.exposure.include=${ACTUATOR_ENDPOINTS:health,info}

# ============================================================
# Railway Fix (IMPORTANT)
# ============================================================

server.address=0.0.0.0

management.endpoint.health.show-details=always
management.endpoint.health.probes.enabled=true

# Disable failing health checks (H2 causes DOWN)
management.health.db.enabled=false
management.health.diskspace.enabled=false
