server:
  port: 8080

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      routes:

        - id: user-service-auth
          uri: lb://USER-SERVICE
          predicates:
            - Path=/auth/**
          filters:
            - StripPrefix=0

        - id: user-service-oauth
          uri: lb://USER-SERVICE
          predicates:
            - Path=/oauth2/**,/login/**
          filters:
            - StripPrefix=0

        - id: quantity-service
          uri: lb://QUANTITY-SERVICE
          predicates:
            - Path=/api/v1/quantities/**,/api/v1/history/**
          filters:
            - StripPrefix=0
            - name: JwtAuthFilter

    discovery:
      locator:
        enabled: true
        lower-case-service-id: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

jwt:
  secret: my-super-secret-key-my-super-secret-key-1234566737234-my-key-secret-key

management:
  endpoints:
    web:
      exposure:
        include: "*"